{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'styles/styles.css' %}">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="auth-card flex flex-col md:flex-row max-w-4xl w-full overflow-hidden">
        
        <div class="md:w-5/12 p-10" style="background: linear-gradient(135deg, #fff, #ffeae8);">
            <h2 class="text-3xl font-bold text-gray-800">Your mental wellness journey begins here.</h2>
        </div>

        <div class="md:w-7/12 p-10 bg-white">
            <h3 class="text-xl font-bold text-gray-800 mb-6">Create Account</h3>
            <form method="POST" class="space-y-4" novalidate>
                {% csrf_token %}
                
                {% for field in form %}
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="text-red-500 text-[10px] mt-1">{{ field.errors.as_text }}</p>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn-primary w-full mt-4">Create Account →</button>
            </form>
        </div>
    </div>
</body>
</html>
